<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#2e3636" />
<title>Mack Magic Mobile Bar | Radio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root{
    --tan:        #c9a876;
    --peach:      #f3ddc4;
    --teal:       #4f7a78;
    --teal-grey:  #5c7876;
    --charcoal:   #232b2a;
    --ink:        #1a201f;
  }

  html, body{
    height: 100%;
    overflow: hidden;
    background: var(--charcoal);
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  canvas#bg{
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .vignette{
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(26,32,31,0) 30%, rgba(26,32,31,0.65) 100%);
    pointer-events: none;
  }

  .brand{
    position: fixed;
    top: 6vh; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  .brand .name{
    font-size: clamp(22px, 5vw, 34px);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--peach);
    font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }
  .brand .sub{
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--tan);
    opacity: 0.85;
  }

  audio{ display:none; }

  .control{
    position: fixed;
    left: 50%; bottom: 7vh;
    transform: translateX(-50%);
    width: 68px; height: 68px;
    border-radius: 50%;
    background: rgba(35,43,42,0.55);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(243,221,196,0.35);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
  }
  .control:hover{ background: rgba(35,43,42,0.75); }
  .control:active{ transform: translateX(-50%) scale(0.94); }
  .control.playing{ border-color: var(--teal); }
  .control svg{ width: 24px; height: 24px; fill: var(--peach); }

  .ring{
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(79,122,120,0.65);
    opacity: 0;
  }
  .control.playing .ring{
    animation: ring 2.2s ease-out infinite;
  }
  @keyframes ring{
    0%   { opacity: 0.55; transform: scale(0.9); }
    100% { opacity: 0;    transform: scale(1.5); }
  }

  .label{
    position: fixed; left: 50%; bottom: calc(7vh + 82px);
    transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(243,221,196,0.75);
    text-align: center;
    white-space: nowrap;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .label.show{ opacity: 1; }
  .label .track{ display:block; margin-top:3px; font-size: 10px; letter-spacing: 0.08em; color: rgba(201,168,118,0.75); text-transform:none; font-style: italic; }
</style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="vignette"></div>

  <div class="brand">
    <div class="name">Mack Magic Mobile Bar</div>
    <div class="sub">Serving Metro Atlanta</div>
  </div>

  <div class="label" id="label">
    Now Playing
    <span class="track" id="trackName">loading station…</span>
  </div>

  <div class="control" id="control" role="button" aria-label="Play or pause music">
    <div class="ring"></div>
    <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    <svg id="iconStop" viewBox="0 0 24 24" style="display:none"><rect x="6" y="6" width="12" height="12"/></svg>
  </div>

  <audio id="audio" preload="auto" crossorigin="anonymous" loop></audio>

  <script>
    // ── Ambient snake animation: a slow, looping line that winds across a
    // soft grid, in tan / peach / teal-grey tones. Purely decorative. ──
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, cell;

    function resize(){
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cell = Math.max(18, Math.min(W, H) / 26);
    }
    window.addEventListener('resize', resize);
    resize();

    const cols = () => Math.ceil(W / cell) + 2;
    const rows = () => Math.ceil(H / cell) + 2;

    let snake = [];
    let dir = { x: 1, y: 0 };
    let head = { x: 2, y: 2 };
    let growUntil = 28;
    let food = null;

    function placeFood(){
      food = {
        x: Math.floor(Math.random() * cols()),
        y: Math.floor(Math.random() * rows())
      };
    }

    function resetSnake(){
      snake = [];
      head = { x: Math.floor(cols()/4), y: Math.floor(rows()/2) };
      dir = { x: 1, y: 0 };
      growUntil = 24 + Math.floor(Math.random() * 14);
      placeFood();
    }
    resetSnake();

    function chooseDir(){
      // bias gently toward food, otherwise wander — keeps it organic, not robotic
      const options = [
        {x:1,y:0}, {x:-1,y:0}, {x:0,y:1}, {x:0,y:-1}
      ].filter(d => !(d.x === -dir.x && d.y === -dir.y)); // no reversing

      let best = dir;
      if (food && Math.random() < 0.55){
        let bestScore = -Infinity;
        for (const d of options){
          const nx = head.x + d.x, ny = head.y + d.y;
          const score = -(Math.abs(nx - food.x) + Math.abs(ny - food.y));
          if (score > bestScore){ bestScore = score; best = d; }
        }
      } else if (Math.random() < 0.18) {
        best = options[Math.floor(Math.random() * options.length)];
      }
      dir = best;
    }

    function step(){
      chooseDir();
      head = { x: head.x + dir.x, y: head.y + dir.y };

      // wrap around edges
      const c = cols(), r = rows();
      if (head.x < 0) head.x = c - 1;
      if (head.x >= c) head.x = 0;
      if (head.y < 0) head.y = r - 1;
      if (head.y >= r) head.y = 0;

      snake.push({ ...head });

      if (food && head.x === food.x && head.y === food.y){
        growUntil += 6;
        placeFood();
      }

      while (snake.length > growUntil) snake.shift();
    }

    function draw(){
      ctx.clearRect(0, 0, W, H);

      // faint grid, very low opacity — masked tan/grey
      ctx.strokeStyle = 'rgba(92,120,118,0.07)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += cell){
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += cell){
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // food, soft peach pulse
      if (food){
        const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 380);
        ctx.fillStyle = `rgba(243,221,196,${0.25 + pulse * 0.35})`;
        ctx.beginPath();
        ctx.arc(food.x * cell + cell/2, food.y * cell + cell/2, cell * 0.28, 0, Math.PI * 2);
        ctx.fill();
      }

      // snake body, gradient from teal-grey tail to tan head
      const n = snake.length;
      for (let i = 0; i < n; i++){
        const seg = snake[i];
        const t = i / Math.max(1, n - 1);
        const r = Math.round(92  + t * (201 - 92));
        const g = Math.round(120 + t * (168 - 120));
        const b = Math.round(118 + t * (118 - 118));
        const alpha = 0.18 + t * 0.55;
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        const pad = cell * 0.12;
        ctx.beginPath();
        ctx.roundRect(seg.x * cell + pad, seg.y * cell + pad, cell - pad*2, cell - pad*2, cell * 0.25);
        ctx.fill();
      }
    }

    let last = 0;
    function loop(ts){
      if (ts - last > 110){
        step();
        draw();
        last = ts;
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    setInterval(() => {
      if (snake.length > 220) resetSnake();
    }, 4000);

    // ── CONFIG: pulling the live track list straight from the repo ──
    const REPO_OWNER = 'fairefaretravels';
    const REPO_NAME   = 'MackMagicMobileBar';
    const RAW_BASE    = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/`;
    const API_URL     = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
    const AUDIO_EXTS  = ['.mp3', '.ogg', '.wav', '.flac', '.m4a', '.aac'];

    const audio   = document.getElementById('audio');
    const control = document.getElementById('control');
    const iconPlay = document.getElementById('iconPlay');
    const iconStop = document.getElementById('iconStop');
    const label   = document.getElementById('label');
    const trackName = document.getElementById('trackName');

    let tracks = [];
    let queue  = [];
    let idx    = 0;
    let labelTimer = null;

    function shuffle(arr){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showLabel(text){
      trackName.textContent = text;
      label.classList.add('show');
      clearTimeout(labelTimer);
      labelTimer = setTimeout(() => label.classList.remove('show'), 3500);
    }

    function setPlayingUI(isPlaying){
      control.classList.toggle('playing', isPlaying);
      iconPlay.style.display = isPlaying ? 'none' : '';
      iconStop.style.display = isPlaying ? '' : 'none';
    }

    function loadTrack(i, autoplay){
      idx = i;
      const t = queue[i];
      audio.src = t.url;
      audio.loop = (queue.length === 1);
      showLabel(t.name);
      if (autoplay){
        audio.play().then(() => setPlayingUI(true)).catch(() => setPlayingUI(false));
      }
    }

    audio.addEventListener('ended', () => {
      if (queue.length > 1){
        loadTrack((idx + 1) % queue.length, true);
      }
    });

    async function loadStation(){
      try{
        const res = await fetch(API_URL, { headers: { 'Accept': 'application/vnd.github+json' } });
        if (!res.ok) throw new Error('repo fetch failed');
        const files = await res.json();
        tracks = files
          .filter(f => f.type === 'file' && AUDIO_EXTS.some(ext => f.name.toLowerCase().endsWith(ext)))
          .map(f => ({
            name: f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
            url:  RAW_BASE + encodeURIComponent(f.name)
          }));

        if (tracks.length === 0){
          showLabel('no tracks found in station');
          return;
        }
        queue = shuffle([...tracks]);
        attemptAutoplay();
      } catch(err){
        showLabel('station unreachable — tap to retry');
      }
    }

    function attemptAutoplay(){
      loadTrack(0, true);
      showLabel(queue[0].name);
    }

    control.addEventListener('click', () => {
      if (!queue.length){ loadStation(); return; }
      if (audio.paused){
        audio.play().then(() => { setPlayingUI(true); showLabel(queue[idx].name); }).catch(() => {});
      } else {
        audio.pause();
        setPlayingUI(false);
        showLabel('paused');
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !audio.paused){
        audio.play().catch(() => {});
      }
    });

    loadStation();
  </script>

</body>
</html>
