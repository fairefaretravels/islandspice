<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#a4131f" />
<title>Traditional | Liberian Feast — July 4th</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root{
    --red:    #a4131f;
    --red-2:  #7d0f18;
    --blue:   #002868;
    --white:  #f7f5f0;
    --gold:   #d9a441;
    --black:  #14110f;
  }

  html, body{
    height: 100%;
    overflow: hidden;
    background: var(--blue);
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  /* Liberian-flag-inspired field: 11 stripes (6 red / 5 white), blue canton, single white star.
     Kept as a calm, slow-breathing backdrop rather than a literal flag graphic. */
  .field{
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      180deg,
      var(--red) 0px, var(--red) 9.09vh,
      var(--white) 9.09vh, var(--white) 18.18vh
    );
    animation: drift 30s ease-in-out infinite alternate;
  }
  @keyframes drift{
    0%   { filter: brightness(1) saturate(1); }
    100% { filter: brightness(0.92) saturate(1.08); }
  }
  .canton{
    position: fixed; top: 0; left: 0;
    width: 38%; height: 38%;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center;
  }
  .star{
    width: 13%; height: 13%;
    background: var(--white);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    opacity: 0.92;
  }

  /* Soft vignette so the whole thing reads as atmosphere, not a poster */
  .vignette{
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(20,17,15,0) 35%, rgba(20,17,15,0.55) 100%);
    pointer-events: none;
  }

  /* Everything else is hidden by default — only the control surfaces below appear */
  audio{ display:none; }

  /* The single control: starts hidden-minimal, just a soft pulse dot until touched */
  .control{
    position: fixed;
    left: 50%; bottom: 7vh;
    transform: translateX(-50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(20,17,15,0.42);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(247,245,240,0.35);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
  }
  .control:hover{ background: rgba(20,17,15,0.6); }
  .control:active{ transform: translateX(-50%) scale(0.94); }
  .control.playing{ border-color: var(--gold); }
  .control svg{ width: 22px; height: 22px; fill: var(--white); }

  .ring{
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(217,164,65,0.6);
    opacity: 0;
  }
  .control.playing .ring{
    animation: ring 2.2s ease-out infinite;
  }
  @keyframes ring{
    0%   { opacity: 0.55; transform: scale(0.9); }
    100% { opacity: 0;    transform: scale(1.5); }
  }

  /* Tiny, dim label — fades away after a few seconds, reappears on hover/tap near the control */
  .label{
    position: fixed; left: 50%; bottom: calc(7vh + 78px);
    transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(247,245,240,0.65);
    text-align: center;
    white-space: nowrap;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .label.show{ opacity: 1; }
  .label .track{ display:block; margin-top:3px; font-size: 10px; letter-spacing: 0.08em; color: rgba(247,245,240,0.4); text-transform:none; font-style: italic; }
</style>
</head>
<body>

  <div class="field"></div>
  <div class="canton"><div class="star"></div></div>
  <div class="vignette"></div>

  <div class="label" id="label">
    Traditional
    <span class="track" id="trackName">loading station…</span>
  </div>

  <div class="control" id="control" role="button" aria-label="Play or stop music">
    <div class="ring"></div>
    <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    <svg id="iconStop" viewBox="0 0 24 24" style="display:none"><rect x="6" y="6" width="12" height="12"/></svg>
  </div>

  <audio id="audio" preload="auto" crossorigin="anonymous" loop></audio>

  <script>
    // ── CONFIG: pulling the live track list straight from the repo ──
    const REPO_OWNER = 'fairefaretravels';
    const REPO_NAME   = 'MackMagicMobileBar';
    const RAW_BASE    = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/`;
    const API_URL     = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
    const AUDIO_EXTS  = ['.mp3', '.ogg', '.wav', '.flac', '.m4a', '.aac'];

    const audio   = document.getElementById('audio');
    const control = document.getElementById('control');
    const iconPlay = document.getElementById('iconPlay');
    const iconStop = document.getElementById('iconStop');
    const label   = document.getElementById('label');
    const trackName = document.getElementById('trackName');

    let tracks = [];
    let queue  = [];
    let idx    = 0;
    let labelTimer = null;

    function shuffle(arr){
      for (let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showLabel(text){
      trackName.textContent = text;
      label.classList.add('show');
      clearTimeout(labelTimer);
      labelTimer = setTimeout(() => label.classList.remove('show'), 3500);
    }

    function setPlayingUI(isPlaying){
      control.classList.toggle('playing', isPlaying);
      iconPlay.style.display = isPlaying ? 'none' : '';
      iconStop.style.display = isPlaying ? '' : 'none';
    }

    function loadTrack(i, autoplay){
      idx = i;
      const t = queue[i];
      audio.src = t.url;
      audio.loop = (queue.length === 1);
      showLabel(t.name);
      if (autoplay){
        audio.play().then(() => setPlayingUI(true)).catch(() => setPlayingUI(false));
      }
    }

    audio.addEventListener('ended', () => {
      if (queue.length > 1){
        loadTrack((idx + 1) % queue.length, true);
      }
    });

    async function loadStation(){
      try{
        const res = await fetch(API_URL, { headers: { 'Accept': 'application/vnd.github+json' } });
        if (!res.ok) throw new Error('repo fetch failed');
        const files = await res.json();
        tracks = files
          .filter(f => f.type === 'file' && AUDIO_EXTS.some(ext => f.name.toLowerCase().endsWith(ext)))
          .map(f => ({
            name: f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
            url:  RAW_BASE + encodeURIComponent(f.name)
          }));

        if (tracks.length === 0){
          showLabel('no tracks found in station');
          return;
        }
        queue = shuffle([...tracks]);
        attemptAutoplay();
      } catch(err){
        showLabel('station unreachable — tap to retry');
      }
    }

    function attemptAutoplay(){
      loadTrack(0, true);
      // Browsers that block unmuted autoplay will land here; the control
      // remains the one visible way in, so a single tap always starts it.
      showLabel(queue[0].name);
    }

    control.addEventListener('click', () => {
      if (!queue.length){ loadStation(); return; }
      if (audio.paused){
        audio.play().then(() => { setPlayingUI(true); showLabel(queue[idx].name); }).catch(() => {});
      } else {
        audio.pause();
        setPlayingUI(false);
        showLabel('paused');
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !audio.paused){
        audio.play().catch(() => {});
      }
    });

    loadStation();
  </script>

</body>
</html>
