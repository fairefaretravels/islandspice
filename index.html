<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#2e3636" />
<title>Mack Magic Mobile Bar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root{
    --tan:        #c9a876;
    --peach:      #f3ddc4;
    --teal:       #4f7a78;
    --teal-grey:  #5c7876;
    --charcoal:   #232b2a;
    --ink:        #1a201f;
  }

  html, body{
    min-height: 100%;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(92,120,118,0.18) 0%, rgba(35,43,42,0) 55%),
      var(--charcoal);
    font-family: 'Georgia', 'Times New Roman', serif;
    color: var(--peach);
  }

  body{
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6vh 6vw;
    text-align: center;
  }

  /* faint grid texture echoing the radio page, kept very quiet here */
  .grid-bg{
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(92,120,118,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(92,120,118,0.05) 1px, transparent 1px);
    background-size: 42px 42px;
    pointer-events: none;
    z-index: 0;
  }

  .vignette{
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(26,32,31,0) 35%, rgba(26,32,31,0.55) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .logo-frame{
    position: relative;
    z-index: 1;
    width: min(420px, 84vw);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(201,168,118,0.4);
    box-shadow: 0 18px 50px rgba(0,0,0,0.45), 0 0 0 1px rgba(243,221,196,0.05) inset;
    background: var(--ink);
  }
  .logo-frame img{
    display: block;
    width: 100%;
    height: auto;
  }
  /* covers the small sparkle artifact baked into the gif's bottom-right corner */
  .logo-frame .patch{
    position: absolute;
    right: 0;
    bottom: 0;
    width: 16%;
    height: 22%;
    background: repeating-linear-gradient(100deg, #5a3a20 0px, #6b4626 6px, #4d2f18 12px, #5a3a20 18px);
    filter: blur(1px);
    pointer-events: none;
  }

  .tagline{
    position: relative;
    z-index: 1;
    margin-top: 22px;
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--tan);
    opacity: 0.9;
  }

  .menu{
    position: relative;
    z-index: 1;
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: min(380px, 86vw);
  }

  .btn{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 24px;
    border-radius: 14px;
    text-decoration: none;
    border: 1px solid rgba(243,221,196,0.25);
    background: linear-gradient(180deg, rgba(92,120,118,0.16), rgba(35,43,42,0.4));
    backdrop-filter: blur(4px);
    transition: transform 0.18s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .btn:hover{
    transform: translateY(-2px);
    border-color: var(--teal);
    background: linear-gradient(180deg, rgba(92,120,118,0.28), rgba(35,43,42,0.55));
  }
  .btn:active{ transform: translateY(0px) scale(0.985); }

  .btn .label{
    font-size: clamp(18px, 4.4vw, 22px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--peach);
  }
  .btn .sub{
    margin-top: 4px;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--tan);
    opacity: 0.85;
  }

  .footer{
    position: relative;
    z-index: 1;
    margin-top: 40px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(243,221,196,0.55);
  }
  .footer a{
    color: var(--tan);
    text-decoration: none;
  }
</style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="vignette"></div>

  <div class="logo-frame">
    <img src="Traditional/MMslide.gif" alt="Mack Magic Mobile Bar logo" />
    <div class="patch"></div>
  </div>

  <div class="tagline">Serving Metro Atlanta — 470-774-2370</div>

  <nav class="menu">
    <a class="btn" href="https://mobile-bartender.vercel.app/Traditional">
      <span class="label">Traditional</span>
      <span class="sub">Classic cocktail menu</span>
    </a>
    <a class="btn" href="https://mobile-bartender.vercel.app/Cantina">
      <span class="label">Cantina</span>
      <span class="sub">Tequila &amp; agave menu</span>
    </a>
  </nav>

  <div class="footer">Mack Magic Mobile Bar · <a href="tel:4707742370">470-774-2370</a></div>

</body>
</html>
